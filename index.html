<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小狗年齡計算機</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="./images/icon.png" />
    <link rel="apple-touch-icon" href="./images/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/icon.png" />
  </head>
  <body>
    <div class="card">
      <h1>小狗年齡計算</h1>

      <div class="dog-avatar" aria-label="漫畫風小狗頭像">
        <svg viewBox="0 0 200 200" role="img" aria-hidden="true">
          <circle cx="100" cy="100" r="92" fill="#fff8e7" />
          <ellipse
            cx="55"
            cy="55"
            rx="22"
            ry="42"
            fill="#8b5e3c"
            transform="rotate(-25 55 55)"
          />
          <ellipse
            cx="145"
            cy="55"
            rx="22"
            ry="42"
            fill="#8b5e3c"
            transform="rotate(25 145 55)"
          />
          <circle cx="100" cy="105" r="58" fill="#f4c38b" />
          <circle cx="78" cy="95" r="7" fill="#2f2f2f" />
          <circle cx="122" cy="95" r="7" fill="#2f2f2f" />
          <circle cx="75" cy="92" r="2" fill="#ffffff" />
          <circle cx="119" cy="92" r="2" fill="#ffffff" />
          <ellipse cx="100" cy="118" rx="20" ry="16" fill="#ffe8d6" />
          <path
            d="M92 116 Q100 124 108 116"
            stroke="#2f2f2f"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
          />
          <ellipse cx="100" cy="110" rx="7" ry="5" fill="#2f2f2f" />
          <path
            d="M100 115 L100 122"
            stroke="#2f2f2f"
            stroke-width="3"
            stroke-linecap="round"
          />
          <path
            d="M100 122 Q92 128 85 124"
            stroke="#2f2f2f"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M100 122 Q108 128 115 124"
            stroke="#2f2f2f"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          />
          <circle cx="68" cy="112" r="6" fill="#f6a6a6" opacity="0.65" />
          <circle cx="132" cy="112" r="6" fill="#f6a6a6" opacity="0.65" />
          <path d="M62 40 Q76 24 92 48" fill="#6b4423" opacity="0.9" />
          <path d="M108 48 Q124 24 138 40" fill="#6b4423" opacity="0.9" />
        </svg>
      </div>

      <div class="form-group">
        <label for="birthday">請選擇小狗生日</label>
        <input type="date" id="birthday" />
      </div>

      <button id="calculateBtn">確認輸入</button>

      <div class="result" id="result">請先選擇小狗生日。</div>
      <div class="hint">換算公式：human_age = 16 ln(dog_age) + 31</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
